name: Build Windows Desktop

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub release from this build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag (e.g. v0.2.0). Required if publish_release is true."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv\Scripts\activate
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Package backend sidecar
        run: |
          cd backend
          .venv\Scripts\activate
          pyinstaller ai-econometrics-backend.spec --distpath ..\desktop\src-tauri\binaries --workpath build -y

      - name: Rename sidecar with target triple
        run: |
          $triple = (rustc --version --verbose | Select-String "host:").ToString().Split(" ")[1]
          Move-Item "desktop\src-tauri\binaries\ai-econometrics-backend.exe" "desktop\src-tauri\binaries\ai-econometrics-backend-$triple.exe" -Force
          Write-Host "Renamed sidecar to ai-econometrics-backend-$triple.exe"
        shell: pwsh

      - name: Verify backend sidecar
        run: |
          $sidecar = Get-ChildItem "desktop\src-tauri\binaries\ai-econometrics-backend-*.exe"
          if (!$sidecar) {
            Write-Error "Backend sidecar not found"
            exit 1
          }
          Write-Host "Backend sidecar built: $($sidecar.Name)"
        shell: pwsh

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build static frontend
        run: |
          cd frontend
          npm run build:static
        shell: pwsh

      - name: Verify frontend export
        run: |
          if (!(Test-Path "frontend\out\index.html")) {
            Write-Error "Frontend static export not found"
            exit 1
          }
          Write-Host "Frontend exported successfully"
        shell: pwsh

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri installer
        run: |
          cd desktop\src-tauri
          tauri build

      - name: Collect release artifacts
        id: artifacts
        run: |
          $outDir = "desktop\src-tauri\target\release\bundle"
          $staging = "release-artifacts"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          $artifacts = @()
          $artifacts += Get-ChildItem "$outDir\msi\*.msi" -ErrorAction SilentlyContinue
          $artifacts += Get-ChildItem "$outDir\nsis\*.exe" -ErrorAction SilentlyContinue

          foreach ($file in $artifacts) {
            Copy-Item $file.FullName $staging
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -Append "$staging\SHA256SUMS.txt" -Encoding utf8
            Write-Host "SHA256($($file.Name)) = $hash"
          }

          if (Test-Path "$staging\SHA256SUMS.txt") {
            Write-Host "--- SHA256SUMS.txt ---"
            Get-Content "$staging\SHA256SUMS.txt"
          }
        shell: pwsh

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-installer
          path: release-artifacts/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: release-artifacts/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-artifacts/SHA256SUMS.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: inputs.publish_release == 'true' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: AI Econometrics Copilot ${{ inputs.release_tag }}
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/*.msi
            release-artifacts/*.exe
            release-artifacts/SHA256SUMS.txt
