services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ECOPILOT_DATABASE_URL=sqlite:///./data/ai_econometrics.db
      - ECOPILOT_DATA_DIR=data
      - ECOPILOT_UPLOAD_DIR=data/uploads
      - ECOPILOT_ARTIFACT_DIR=data/artifacts
      - ECOPILOT_CORS_ORIGINS=["http://localhost:3000"]
      - ECOPILOT_LOG_LEVEL=INFO
    volumes:
      - ai_econometrics_data:/app/data
      - ./sample_data:/app/sample_data:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ai_econometrics_data:
