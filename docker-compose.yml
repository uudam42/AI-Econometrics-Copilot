services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ECOPILOT_CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - backend_storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  backend_storage:
